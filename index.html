<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F7EFE3">
<title>Bakery Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🥖</text></svg>">
<style>
:root{
  --bg:#F7EFE3; --surface:#FFFBF4; --surface2:#F1E5D2; --ink:#3A2A1C; --muted:#8A7560;
  --primary:#9C5B2B; --primary-ink:#FFF8EE; --accent:#C4502E; --gold:#C98F2E;
  --line:#E7D7BF; --ok:#5B7A3A; --shadow:0 6px 24px rgba(90,60,30,.10), 0 1px 3px rgba(90,60,30,.08);
  --r:18px; --r-s:12px; --nav-h:64px;
}
[data-theme="dark"]{
  --bg:#191210; --surface:#231A15; --surface2:#2E2118; --ink:#F3E7D7; --muted:#A8927C;
  --primary:#D98E4A; --primary-ink:#241405; --accent:#E2714B; --gold:#D9A441;
  --line:#3B2C21; --ok:#9DBA6E; --shadow:0 6px 24px rgba(0,0,0,.45), 0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--ink);
  font-size:16.5px; line-height:1.55; padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background-image:radial-gradient(rgba(150,110,60,.06) 1px, transparent 1.4px);
  background-size:22px 22px; min-height:100vh;
}
h1,h2,h3,.display{font-family:'Fraunces',serif; line-height:1.2; margin:0 0 .4em}
button{font-family:inherit}
header.app{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:8px;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px; background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
}
header.app .brand{font-family:'Fraunces',serif; font-weight:700; font-size:21px; letter-spacing:.2px; flex:1; display:flex; align-items:center; gap:8px}
header.app .brand .crumb{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--accent)}
.iconbtn{
  border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:999px;
  min-width:42px; height:42px; padding:0 12px; font-size:15px; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
.iconbtn:active{transform:scale(.96)}
main{padding:18px 16px 28px; max-width:760px; margin:0 auto}
.tagline{color:var(--muted); font-size:14px; margin:-4px 0 14px}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:16px; margin-bottom:14px}
.card.flat{box-shadow:none}
.row{display:flex; gap:10px; align-items:center}
.row .grow{flex:1}
.chip{display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; background:var(--surface2); border:1px solid var(--line); font-size:13px; font-weight:600; color:var(--muted)}
.chip.on{background:var(--primary); color:var(--primary-ink); border-color:var(--primary)}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  background:var(--primary); color:var(--primary-ink); border:none; border-radius:999px;
  padding:13px 22px; font-size:16px; font-weight:700; box-shadow:var(--shadow);
}
.btn.big{width:100%; padding:16px; font-size:18px}
.btn.ghost{background:var(--surface); color:var(--ink); border:1px solid var(--line); box-shadow:none}
.btn.warn{background:var(--accent); color:#fff}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45; pointer-events:none}
input,select,textarea{
  font-family:inherit; font-size:16px; color:var(--ink); background:var(--surface);
  border:1.5px solid var(--line); border-radius:var(--r-s); padding:11px 12px; width:100%;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--primary)}
label.f{display:block; font-size:13px; font-weight:700; color:var(--muted); margin:12px 0 5px; text-transform:uppercase; letter-spacing:.4px}
nav.bottom{
  position:fixed; left:0; right:0; bottom:0; z-index:40; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom); display:flex; background:var(--surface);
  border-top:1px solid var(--line); box-shadow:0 -4px 20px rgba(80,50,20,.08);
}
nav.bottom button{
  flex:1; border:none; background:none; color:var(--muted); font-size:11px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; padding-top:6px;
}
nav.bottom button svg{width:24px; height:24px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
nav.bottom button.on{color:var(--primary)}
nav.bottom button.on svg{stroke-width:2.3}
.recipe-card{display:flex; gap:14px; align-items:center; cursor:pointer}
.recipe-card .ico{width:54px; height:54px; border-radius:16px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0}
.recipe-card h3{margin:0; font-size:18px}
.recipe-card .meta{color:var(--muted); font-size:13.5px; margin-top:2px}
.pillrow{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 16px}
table.ing{width:100%; border-collapse:collapse; font-size:15.5px}
table.ing td{padding:9px 4px; border-bottom:1px dashed var(--line)}
table.ing td:nth-child(2){text-align:right; font-weight:700; white-space:nowrap}
table.ing td:nth-child(3){text-align:right; color:var(--muted); font-size:13px; width:64px; white-space:nowrap}
.stepline{display:flex; gap:12px; padding:10px 0; border-bottom:1px dashed var(--line); align-items:baseline}
.stepline .n{font-family:'Fraunces',serif; font-weight:700; color:var(--accent); min-width:26px}
.stepline .tmr{margin-left:auto; color:var(--muted); font-size:13px; white-space:nowrap; font-weight:700}
.timer-display{font-family:'Fraunces',serif; font-weight:700; font-size:72px; text-align:center; letter-spacing:1px; margin:8px 0; font-variant-numeric:tabular-nums}
.timer-display.done{color:var(--accent); animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
.progressbar{height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; margin:10px 0}
.progressbar i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--accent)); border-radius:99px; transition:width .5s}
.stars{display:flex; gap:6px; font-size:30px; cursor:pointer; user-select:none}
.stars span{opacity:.25; transition:.15s}
.stars span.on{opacity:1}
.photo-grid{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
.photo-grid img{width:92px; height:92px; object-fit:cover; border-radius:12px; border:1px solid var(--line)}
.photo-grid .addph{width:92px; height:92px; border-radius:12px; border:2px dashed var(--line); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--muted); cursor:pointer; background:none}
.modal-bg{position:fixed; inset:0; background:rgba(30,18,8,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center; animation:fade .2s}
@keyframes fade{from{opacity:0}}
.modal{
  background:var(--bg); width:100%; max-width:760px; max-height:92vh; overflow:auto;
  border-radius:24px 24px 0 0; padding:20px 18px calc(24px + env(safe-area-inset-bottom));
  animation:up .25s cubic-bezier(.2,.9,.3,1);
}
@keyframes up{from{transform:translateY(40px); opacity:0}}
.modal .handle{width:44px; height:5px; border-radius:99px; background:var(--line); margin:0 auto 14px}
.empty{text-align:center; color:var(--muted); padding:36px 10px}
.empty .big{font-size:44px; margin-bottom:8px}
.kbd{background:var(--surface2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-size:13px; font-weight:700}
.note{font-size:13.5px; color:var(--muted)}
pre.code{background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-s); padding:12px; font-size:12.5px; white-space:pre-wrap; word-break:break-word; max-height:300px; overflow:auto}
.seg{display:flex; background:var(--surface2); border-radius:999px; padding:4px; gap:4px; border:1px solid var(--line)}
.seg button{flex:1; border:none; border-radius:999px; padding:9px 6px; background:none; color:var(--muted); font-weight:700; font-size:14px; cursor:pointer}
.seg button.on{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}
.toolgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.toolgrid .card{margin:0; text-align:center; cursor:pointer; padding:20px 10px}
.toolgrid .card .em{font-size:34px; margin-bottom:6px}
.toolgrid .card h3{font-size:15.5px; margin:0}
.result-box{background:var(--surface2); border-radius:var(--r-s); padding:14px; text-align:center; margin-top:14px}
.result-box .v{font-family:'Fraunces',serif; font-size:34px; font-weight:700; color:var(--primary)}
.feeditem{display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line)}
.feeditem .dot{width:12px; height:12px; border-radius:50%; background:var(--gold); margin-top:6px; flex-shrink:0}
.toast{position:fixed; bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:11px 20px; border-radius:999px; font-weight:600; z-index:90; animation:fade .2s; max-width:88vw; text-align:center}
.del-x{border:none; background:none; color:var(--accent); font-size:20px; cursor:pointer; padding:4px 8px}
@media(min-width:700px){ .toolgrid{grid-template-columns:repeat(3,1fr)} .modal{border-radius:24px; align-self:center} .modal-bg{align-items:center} }
</style>
</head>
<body data-theme="light">

<div id="modalRoot"></div>

<script>

  nav_starter:["Starter","Starter"], nav_log:["Log","บันทึก"],

  resume_bake:["Resume bake in progress","ทำการอบที่ค้างไว้ต่อ"],

  t_units:["Unit Converter","แปลงหน่วย"], t_ddt:["DDT — Water Temp","DDT — อุณหภูมิน้ำ"], t_pan:["Pan Size Converter","แปลงขนาดถาด"],

  add_row:["+ Add row","+ เพิ่มแถว"], water:["Water","น้ำ"], salt:["Salt","เกลือ"], starter:["Starter (levain)","Starter (levain)"],
  water_g:["Water (g)","น้ำ (g)"], starter_g:["Starter (g)","Starter (g)"], starter_hyd:["Starter hydration %","Hydration ของ starter %"],
  total_hydration:["Total hydration","Hydration รวม"],
  u_what:["Ingredient type","ชนิดวัตถุดิบ"], u_amount:["Amount","ปริมาณ"], u_from:["From","จาก"], u_temp:["Temperature","อุณหภูมิ"],
  ddt_desired:["Desired dough temp (°C)","อุณหภูมิโดที่ต้องการ (°C)"], ddt_room:["Room temp (°C)","อุณหภูมิห้อง (°C)"],
  ddt_flour:["Flour temp (°C)","อุณหภูมิแป้ง (°C)"], ddt_friction:["Friction factor (°C)","Friction factor (°C)"],
  ddt_result:["Use water at","ใช้น้ำอุณหภูมิ"],
  pan_orig:["Original pan","ถาดในสูตร"], pan_new:["Your pan","ถาดของคุณ"], pan_round:["Round Ø (cm)","กลม Ø (cm)"],
  pan_rect:["Rectangle (cm)","สี่เหลี่ยม (cm)"], pan_result:["Multiply recipe by","คูณสูตรด้วย"],

  peak_hours:["Hours to peak (optional)","กี่ชม.ถึง peak (ไม่บังคับ)"], rise:["Rise (e.g. 2x)","ขึ้นกี่เท่า (เช่น 2x)"],
  feed_note:["Note (temp, smell, ...)","โน้ต (อุณหภูมิ, กลิ่น, ...)"], last_fed:["Last fed","ให้อาหารล่าสุด"],
  hours_ago:["h ago","ชม.ที่แล้ว"], no_feedings:["No feedings logged yet","ยังไม่มีบันทึกการให้อาหาร"],

  type_pastry:["Pastry / Cookie","เพสตรี้ / คุกกี้"], is_flour:["flour","แป้ง"],
  step_title:["Step title","ชื่อขั้นตอน"], step_desc:["Description","รายละเอียด"], minutes:["min","นาที"],

  export_data:["Export backup (JSON)","Export สำรองข้อมูล (JSON)"], import_data:["Import backup","Import ข้อมูลสำรอง"],
  export_note:["Download all recipes, logs & starter data as one file. Do this monthly!","ดาวน์โหลดสูตร บันทึก และข้อมูล starter ทั้งหมดเป็นไฟล์เดียว แนะนำทำเดือนละครั้ง!"],
  import_warn:["Importing replaces ALL current data. Continue?","การ import จะแทนที่ข้อมูลทั้งหมด ดำเนินการต่อ?"],
  data_saved:["Saved ✓","บันทึกแล้ว ✓"], copied:["Copied ✓","คัดลอกแล้ว ✓"],

  min_short:["min","นาที"], hr_short:["h","ชม."],

  source:["Source (URL / book)","ที่มา (URL / หนังสือ)"], notes_opt:["Recipe notes (optional)","โน้ตของสูตร (ไม่บังคับ)"],
};
let LANG = 'en';
const t = k => (I18N[k]||[k,k])[LANG==='en'?0:1];
const tn = obj => typeof obj==='string' ? obj : (obj?.[LANG] || obj?.en || obj?.th || '');

/* ============ IndexedDB ============ */
const DB_NAME='bakery-center', DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    ['recipes','logs','feedings','kv'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'});});
  };
  r.onsuccess=e=>{db=e.target.result;res(db)}; r.onerror=()=>rej(r.error);
});}
const tx=(store,mode='readonly')=>db.transaction(store,mode).objectStore(store);
const dbAll=s=>new Promise(r=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result||[])});
const dbGet=(s,id)=>new Promise(r=>{const q=tx(s).get(id);q.onsuccess=()=>r(q.result)});
const dbPut=(s,v)=>new Promise(r=>{const q=tx(s,'readwrite').put(v);q.onsuccess=()=>r(v)});
const dbDel=(s,id)=>new Promise(r=>{const q=tx(s,'readwrite').delete(id);q.onsuccess=()=>r()});
const dbClear=s=>new Promise(r=>{const q=tx(s,'readwrite').clear();q.onsuccess=()=>r()});

let TAB='recipes', recipes=[], session=null, tickInt=null, wakeLock=null;
let recipeFilter='all', recipeSearch='';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){const r=$('#toastRoot');r.innerHTML=`<div class="toast">${esc(msg)}</div>`;setTimeout(()=>r.innerHTML='',2200);}
function modal(html){$('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="handle"></div>${html}</div></div>`;}
function closeModal(){$('#modalRoot').innerHTML='';}
const fmtG=g=>Math.round(g*10)/10;
const catName=c=>t('cat_'+c);
const CATS=['sourdough','italian','cookies','brownies','other'];
const ICONS={sourdough:'🍞',italian:'🥖',cookies:'🍪',brownies:'🍫',other:'🧁'};

function flourTotal(r){return r.ingredients.filter(i=>i.flour).reduce((a,i)=>a+i.g,0);}
function doughTotal(r){return r.ingredients.reduce((a,i)=>a+i.g,0);}
function hydrationOf(r){
  const f=flourTotal(r); if(!f)return null;
  let water=0,sFlour=0,sWater=0;
  r.ingredients.forEach(i=>{
    const n=(tn(i.name)||'').toLowerCase();
    if(i.flour)return;
    if(/starter|levain/.test(n)){sFlour+=i.g/2;sWater+=i.g/2;}
    else if(/water|น้ำอุ่น|^น้ำ/.test(n)&&!/น้ำมัน|น้ำตาล|oil|sugar/.test(n))water+=i.g;
  });
  return Math.round((water+sWater)/(f+sFlour)*100);
}

/* ============ Guided Bake session ============ */
async function startBake(id,scale){
  const r=await dbGet('recipes',id);
  session={recipeId:id,recipeName:tn(r.name),scale:scale||1,step:0,startedAt:Date.now(),
           stepStartedAt:Date.now(),endsAt:null,paused:false,pausedRemain:0,acknowledged:false};
  const m=r.steps[0]?.m||0;
  session.endsAt=m?Date.now()+m*60000:null;
  await kvSet('session',session);
  TAB='bake'; render();
}
async function vBake(){
  session = session || await kvGet('session');
  if(!session){
    $('#view').innerHTML=`<h1>${t('nav_bake')}</h1>
    <div class="empty"><div class="big">🔥</div><h3>${t('bake_none')}</h3>
    <div class="note" style="max-width:340px;margin:8px auto 20px">${t('bake_none_sub')}</div>
    <button class="btn" onclick="go('recipes')">${t('browse_recipes')}</button></div>`;
    stopTick(); releaseWake(); return;
  }
  const r=await dbGet('recipes',session.recipeId);
  if(!r){session=null;await kvSet('session',null);return vBake();}
  const s=r.steps[session.step], last=session.step>=r.steps.length-1;
  $('#view').innerHTML=`
  <div class="note">${esc(session.recipeName)} ${session.scale!==1?`· ×${session.scale} ${t('scaled')}`:''}</div>
  <h1 style="font-size:22px;margin:2px 0 4px">${t('step')} ${session.step+1} ${t('of')} ${r.steps.length}: ${esc(tn(s.t))}</h1>
  <div class="progressbar"><i style="width:${(session.step)/r.steps.length*100}%"></i></div>
  <div class="card">
    <div style="font-size:17px">${esc(tn(s.d))}</div>
    ${stepIngHint(r,s)}
  </div>
  <div class="card" style="text-align:center">
    ${s.m?`<div class="timer-display" id="tmr">--:--</div>
      <div class="note" id="tmrNote"></div>
      <div class="row" style="margin-top:12px;justify-content:center">
        <button class="btn ghost" onclick="addTime(5)">${t('add_5m')}</button>
        <button class="btn ghost" id="btnPause" onclick="pauseTimer()">${session.paused?t('resume'):t('pause')}</button>
      </div>`
     :`<div style="font-size:40px;margin:6px 0">👨‍🍳</div><div class="note">${t('no_timer')}</div>`}
  </div>
  <button class="btn big ${last?'warn':''}" onclick="${last?'finishBake()':'nextStep()'}">${last?'✓ '+t('finish_bake'):t('next_step')+' ›'}</button>
  <div class="row" style="margin-top:12px">
    <button class="btn ghost grow" onclick="vRecipeDetail('${r.id}',${session.scale})">${t('nav_recipes')}: ${t('ingredients')}</button>
    <button class="btn ghost" style="color:var(--accent)" onclick="abortBake()">✕ ${t('abort')}</button>
  </div>
  <div class="note" style="text-align:center;margin-top:14px">🔆 ${t('keep_awake')}</div>`;
  if(s.m){startTick();}else{stopTick();}
  acquireWake();
}
function stepIngHint(r,s){
  const words=(tn(s.t)+' '+tn(s.d)).toLowerCase();
  const hits=r.ingredients.filter(i=>{
    const n=tn(i.name).toLowerCase().split(/[\s(（]/)[0];
    return n.length>2&&words.includes(n);
  });
  if(!hits.length)return '';
  return `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)" class="note">
    ${hits.map(i=>`<b>${esc(tn(i.name))}</b> ${fmtG(i.g*session.scale)} g`).join(' · ')}</div>`;
}
function startTick(){stopTick(); tick(); tickInt=setInterval(tick,500);}
function stopTick(){if(tickInt){clearInterval(tickInt);tickInt=null;}}
function tick(){
  if(!session||!session.endsAt)return;
  const el=$('#tmr'); if(!el)return;
  let remain=session.paused?session.pausedRemain:session.endsAt-Date.now();
  const over=remain<0; const abs=Math.abs(remain);
  const m=Math.floor(abs/60000), sec=Math.floor(abs%60000/1000);
  const hh=m>=60?Math.floor(m/60)+':'+String(m%60).padStart(2,'0')+':'+String(sec).padStart(2,'0')
             :m+':'+String(sec).padStart(2,'0');
  el.textContent=(over?'+':'')+hh;
  el.classList.toggle('done',over);
  $('#tmrNote').textContent=over?t('elapsed')+' — '+t('step_done'):'';
  if(over&&!session.acknowledged){session.acknowledged=true;kvSet('session',session);ringBell();}
}
function addTime(min){
  if(!session.endsAt)return;
  if(session.paused)session.pausedRemain+=min*60000; else session.endsAt+=min*60000;
  session.acknowledged=false; kvSet('session',session); tick();
}
function pauseTimer(){
  if(session.paused){session.endsAt=Date.now()+session.pausedRemain;session.paused=false;}
  else{session.pausedRemain=session.endsAt-Date.now();session.paused=true;}
  kvSet('session',session); $('#btnPause').textContent=session.paused?t('resume'):t('pause');
}
async function nextStep(){
  const r=await dbGet('recipes',session.recipeId);
  session.step++; session.stepStartedAt=Date.now(); session.acknowledged=false; session.paused=false;
  const m=r.steps[session.step]?.m||0;
  session.endsAt=m?Date.now()+m*60000:null;
  await kvSet('session',session); vBake();
}
async function abortBake(){
  if(!confirm(LANG==='en'?'Abort this bake?':'ยกเลิกการอบครั้งนี้?'))return;
  session=null; await kvSet('session',null); stopTick(); releaseWake(); vBake();
}
async function finishBake(){
  const fin={recipeId:session.recipeId,recipeName:session.recipeName,scale:session.scale,startedAt:session.startedAt};
  session=null; await kvSet('session',null); stopTick(); releaseWake();
  logEditor(null,fin);
}

/* ============ Bell & Wake Lock ============ */
let actx;
function primeAudio(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
  }catch(e){}
}
document.addEventListener('click',primeAudio,{capture:true});
document.addEventListener('touchend',primeAudio,{capture:true});
function ringBell(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    let n=0;
    const ding=()=>{
      if(n++>5)return;
      [880,1318].forEach((f,i)=>{
        const o=actx.createOscillator(),g=actx.createGain();
        o.frequency.value=f; o.type='sine'; o.connect(g); g.connect(actx.destination);
        const t0=actx.currentTime+i*.05;
        g.gain.setValueAtTime(.001,t0); g.gain.exponentialRampToValueAtTime(.4,t0+.02);
        g.gain.exponentialRampToValueAtTime(.001,t0+.9); o.start(t0); o.stop(t0+1);
      });
      setTimeout(ding,1400);
    };
    ding();
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([300,150,300,150,500]);
}
async function acquireWake(){
  try{ if(!wakeLock&&'wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWake(){ try{wakeLock?.release(); wakeLock=null;}catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&session)acquireWake(); });

      <button class="del-x" onclick="bpRows.splice(${i},1);vTools()">✕</button></div>`).join('')}
    <button class="btn ghost" style="margin-top:12px" onclick="bpRows.push(['',0]);vTools()">${t('add_row')}</button>
    <div class="result-box"><div class="note">${t('total_dough')}</div><div class="v" id="bpTotal"></div></div>
  </div>`;
  bpCalc();
 },
 hyd(){
  $('#view').innerHTML=`${toolBack}<h1>${t('t_hydration')}</h1>
  <div class="card">
    <label class="f" style="margin-top:0">${t('flour_weight')}</label><input id="hF" type="number" inputmode="decimal" value="500" oninput="hCalc()">
    <label class="f">${t('water_g')}</label><input id="hW" type="number" inputmode="decimal" value="360" oninput="hCalc()">
    <label class="f">${t('starter_g')}</label><input id="hS" type="number" inputmode="decimal" value="100" oninput="hCalc()">
    <label class="f">${t('starter_hyd')}</label><input id="hSH" type="number" inputmode="decimal" value="100" oninput="hCalc()">
    <div class="result-box"><div class="note">${t('total_hydration')}</div><div class="v" id="hOut"></div></div>
  </div>`;
  hCalc();
 },
 units(){
  $('#view').innerHTML=`${toolBack}<h1>${t('t_units')}</h1>
  <div class="card">
    <label class="f" style="margin-top:0">${t('u_what')}</label>
    <select id="uIng" onchange="uCalc()">${Object.keys(CUPG).map(k=>`<option value="${k}">${k}</option>`).join('')}</select>
    <div class="row" style="margin-top:12px">
      <div class="grow"><label class="f" style="margin-top:0">${t('u_amount')}</label><input id="uAmt" type="number" inputmode="decimal" value="1" oninput="uCalc()"></div>
      <div class="grow"><label class="f" style="margin-top:0">${t('u_from')}</label>
        <select id="uUnit" onchange="uCalc()"><option value="cup">cup</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="oz">oz</option></select></div>
    </div>
    <div class="result-box"><div class="v" id="uOut"></div></div>
  </div>
  <div class="card">
    <label class="f" style="margin-top:0">${t('u_temp')}</label>
    <div class="row"><input id="uF" type="number" inputmode="decimal" placeholder="°F" oninput="$('#uC').value=Math.round((this.value-32)*5/9*10)/10">
    <span>⇄</span><input id="uC" type="number" inputmode="decimal" placeholder="°C" oninput="$('#uF').value=Math.round((this.value*9/5+32)*10)/10"></div>
  </div>`;
  uCalc();
 },
 ddt(){
  $('#view').innerHTML=`${toolBack}<h1>${t('t_ddt')}</h1>
  <div class="card">
    <label class="f" style="margin-top:0">${t('ddt_desired')}</label><input id="dD" type="number" inputmode="decimal" value="25" oninput="dCalc()">
    <label class="f">${t('ddt_room')}</label><input id="dR" type="number" inputmode="decimal" value="30" oninput="dCalc()">
    <label class="f">${t('ddt_flour')}</label><input id="dF" type="number" inputmode="decimal" value="29" oninput="dCalc()">
    <label class="f">${t('ddt_friction')}</label><input id="dX" type="number" inputmode="decimal" value="1" oninput="dCalc()">
    <div class="result-box"><div class="note">${t('ddt_result')}</div><div class="v" id="dOut"></div></div>
    <div class="note" style="margin-top:8px">Water temp = (DDT × 3) − room − flour − friction</div>
  </div>`;
  dCalc();
 },
 pan(){
  $('#view').innerHTML=`${toolBack}<h1>${t('t_pan')}</h1>
  <div class="card">
    <h3 style="font-size:16px">${t('pan_orig')}</h3>${panInputs('a')}
    <h3 style="font-size:16px;margin-top:16px">${t('pan_new')}</h3>${panInputs('b')}
    <div class="result-box"><div class="note">${t('pan_result')}</div><div class="v" id="pOut"></div></div>
  </div>`;
  pCalc();
 }
};
function panInputs(p){return `
  <div class="seg" style="margin-bottom:8px">
    <button id="${p}Rd" class="on" onclick="panShape('${p}','round')">${t('pan_round')}</button>
    <button id="${p}Rc" onclick="panShape('${p}','rect')">${t('pan_rect')}</button></div>
  <div class="row">
    <input id="${p}1" type="number" inputmode="decimal" value="20" oninput="pCalc()" placeholder="cm">
    <span id="${p}x" style="display:none">×</span>
    <input id="${p}2" type="number" inputmode="decimal" value="20" oninput="pCalc()" placeholder="cm" style="display:none"></div>`;}
const panShapeState={a:'round',b:'round'};
function panShape(p,s){panShapeState[p]=s;
  $('#'+p+'Rd').classList.toggle('on',s==='round'); $('#'+p+'Rc').classList.toggle('on',s==='rect');
  $('#'+p+'2').style.display=$('#'+p+'x').style.display=s==='rect'?'':'none'; pCalc();}
const panArea=p=>{const a=+$('#'+p+'1').value||0,b=+$('#'+p+'2').value||0;
  return panShapeState[p]==='round'?Math.PI*(a/2)**2:a*b;};
function pCalc(){const A=panArea('a'),B=panArea('b'); $('#pOut').textContent=A?'× '+(Math.round(B/A*100)/100):'—';}
function bpCalc(){const f=+$('#bpF').value||0;let tot=f;
  bpRows.forEach((r,i)=>{const g=f*r[1]/100;tot+=g;const el=$('#bpR'+i);if(el)el.textContent=fmtG(g)+' g';});
  $('#bpTotal').textContent=fmtG(tot)+' g';}
function hCalc(){const f=+$('#hF').value||0,w=+$('#hW').value||0,s=+$('#hS').value||0,sh=+$('#hSH').value||100;
  const sf=s/(1+sh/100), sw=s-sf;
  $('#hOut').textContent=f+sf?Math.round((w+sw)/(f+sf)*1000)/10+' %':'—';}
const CUPG={'Flour (AP/bread)':120,'Whole wheat flour':113,'Granulated sugar':200,'Brown sugar (packed)':220,
 'Powdered sugar':120,'Butter':227,'Cocoa powder':85,'Water / Milk':240,'Vegetable oil':218,'Olive oil':216,
 'Honey / Syrup':340,'Chocolate chips':170,'Oats (rolled)':90,'Salt (table)':288,'Instant yeast':150};
function uCalc(){const g=CUPG[$('#uIng').value],a=+$('#uAmt').value||0,u=$('#uUnit').value;
  const cups=u==='cup'?a:u==='tbsp'?a/16:u==='tsp'?a/48:0;
  const out=u==='oz'?a*28.35:cups*g;
  $('#uOut').textContent=fmtG(out)+' g';}
function dCalc(){const v=(+$('#dD').value*3)-(+$('#dR').value)-(+$('#dF').value)-(+$('#dX').value);
  $('#dOut').textContent=Math.round(v*10)/10+' °C';}

/* ============ Starter tracker ============ */
async function vStarter(){
  const feeds=(await dbAll('feedings')).sort((a,b)=>b.at-a.at);
  const last=feeds[0];
  const ago=last?Math.round((Date.now()-last.at)/3600000*10)/10:null;
  $('#view').innerHTML=`<h1>${t('starter_title')}</h1><div class="tagline">${t('starter_sub')}</div>
  ${last?`<div class="card" style="display:flex;align-items:center;gap:14px">
    <div style="font-size:38px">🫙</div>
    <div><div class="note">${t('last_fed')}</div>
    <div style="font-family:'Fraunces',serif;font-size:26px;font-weight:700">${ago} ${t('hours_ago')}</div>
    <div class="note">${esc(last.ratio||'')} ${last.rise?'· '+esc(last.rise):''}</div></div></div>`:''}
  <button class="btn big" onclick="feedEditor()">🥄 ${t('fed_now')}</button>
  <div class="card" style="margin-top:14px">
    ${feeds.map(f=>`<div class="feeditem"><div class="dot"></div>
      <div class="grow"><b>${new Date(f.at).toLocaleString(LANG==='th'?'th-TH':'en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</b>
        <span class="note"> · ${esc(f.ratio||'')}</span>
        ${f.peak?`<span class="note"> · peak ${esc(f.peak)} ${t('hr_short')}</span>`:''}
        ${f.rise?`<span class="note"> · ${esc(f.rise)}</span>`:''}
        ${f.note?`<div class="note">${esc(f.note)}</div>`:''}</div>
      <button class="del-x" onclick="delFeed('${f.id}')">✕</button></div>`).join('')
     || `<div class="empty"><div class="big">🫙</div>${t('no_feedings')}</div>`}
  </div>`;
}
function feedEditor(){
  modal(`<h2>${t('fed_now')}</h2>
  <label class="f">${t('ratio')}</label><input id="fdRatio" value="1:5:5" placeholder="1:5:5">
  <div class="row" style="margin-top:4px">
    <div class="grow"><label class="f">${t('peak_hours')}</label><input id="fdPeak" type="number" inputmode="decimal" placeholder="5"></div>
    <div class="grow"><label class="f">${t('rise')}</label><input id="fdRise" placeholder="2x"></div>
  </div>
  <label class="f">${t('feed_note')}</label><input id="fdNote" placeholder="">
  <div class="row" style="margin-top:18px">
    <button class="btn ghost grow" onclick="closeModal()">${t('cancel')}</button>
    <button class="btn grow" onclick="saveFeed()">${t('save')}</button>
  </div>`);
}
async function saveFeed(){
  await dbPut('feedings',{id:uid(),at:Date.now(),ratio:$('#fdRatio').value,peak:$('#fdPeak').value,rise:$('#fdRise').value,note:$('#fdNote').value});
  closeModal(); toast(t('data_saved')); vStarter();
}
async function delFeed(id){if(!confirm(t('confirm_del')))return; await dbDel('feedings',id); vStarter();}

/* ============ Bake Log ============ */
let logPhotos=[];
async function vLog(){
  const logs=(await dbAll('logs')).sort((a,b)=>b.at-a.at);
  $('#view').innerHTML=`<h1>${t('log_title')}</h1><div class="tagline">${t('log_sub')}</div>
  <button class="btn big" onclick="logEditor()">＋ ${t('add_log')}</button>
  <div style="margin-top:14px">
  ${logs.map(l=>`<div class="card">
    <div class="row"><div class="grow"><h3 style="margin:0;font-size:17px">${esc(l.recipeName)}</h3>
      <div class="note">${new Date(l.at).toLocaleString(LANG==='th'?'th-TH':'en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}${l.scale&&l.scale!==1?' · ×'+l.scale:''}</div></div>
      <div style="color:var(--gold);font-size:16px;white-space:nowrap">${'★'.repeat(l.rating||0)}<span style="opacity:.25">${'★'.repeat(5-(l.rating||0))}</span></div>
      <button class="del-x" onclick="delLog('${l.id}')">✕</button></div>
    ${l.notes?`<div style="margin-top:8px;font-size:15px">${esc(l.notes)}</div>`:''}
    ${l.photos?.length?`<div class="photo-grid">${l.photos.map(p=>`<img src="${p}" onclick="viewPhoto('${l.id}',${l.photos.indexOf(p)})">`).join('')}</div>`:''}
  </div>`).join('') || `<div class="empty"><div class="big">📓</div>${t('no_logs')}</div>`}
  </div>`;
}
async function viewPhoto(logId,idx){
  const l=await dbGet('logs',logId);
  modal(`<img src="${l.photos[idx]}" style="width:100%;border-radius:14px">
  <button class="btn ghost big" style="margin-top:12px" onclick="closeModal()">${t('close')}</button>`);
}
async function logEditor(id,prefill){
  recipes=await dbAll('recipes');
  const l=id?await dbGet('logs',id):{id:uid(),at:Date.now(),recipeId:prefill?.recipeId||'',recipeName:prefill?.recipeName||'',scale:prefill?.scale||1,rating:0,notes:'',photos:[]};
  logPhotos=[...(l.photos||[])]; let rating=l.rating||0;
  window._logRate=v=>{rating=v;document.querySelectorAll('.stars span').forEach((s,i)=>s.classList.toggle('on',i<v));};
  window._logSave=async()=>{
    l.recipeId=$('#lgRec').value; l.recipeName=$('#lgRec').selectedOptions[0]?.dataset.name||$('#lgRec').selectedOptions[0]?.text||'';
    l.rating=rating; l.notes=$('#lgNotes').value; l.photos=logPhotos;
    await dbPut('logs',l); closeModal();
    toast(prefill?t('bake_saved'):t('data_saved')); TAB='log'; render();
  };
  modal(`<h2>${t('add_log')} ${prefill?'🎉':''}</h2>
  <label class="f">${t('log_recipe')}</label>
  <select id="lgRec">${recipes.map(r=>`<option value="${r.id}" data-name="${esc(tn(r.name))}" ${r.id===l.recipeId?'selected':''}>${esc(tn(r.name))}</option>`).join('')}
    <option value="" ${!l.recipeId?'selected':''}>${LANG==='en'?'(other)':'(อื่นๆ)'}</option></select>
  <label class="f">${t('log_rating')}</label>
  <div class="stars">${[1,2,3,4,5].map(i=>`<span class="${i<=rating?'on':''}" onclick="_logRate(${i})">★</span>`).join('')}</div>
  <label class="f">${t('log_notes')}</label><textarea id="lgNotes" rows="3">${esc(l.notes||'')}</textarea>
  <label class="f">${t('log_photos')}</label>
  <div class="photo-grid" id="lgPhotos"></div>
  <input type="file" id="lgFile" accept="image/*" style="display:none" onchange="addLogPhoto(this)">
  <div class="row" style="margin-top:18px">
    <button class="btn ghost grow" onclick="closeModal()">${t('cancel')}</button>
    <button class="btn grow" onclick="_logSave()">${t('save')}</button>
  </div>`);
  renderLogPhotos();
}
function renderLogPhotos(){
  $('#lgPhotos').innerHTML=logPhotos.map((p,i)=>`<div style="position:relative"><img src="${p}">
    <button class="del-x" style="position:absolute;top:-6px;right:-6px;background:var(--surface);border-radius:50%;border:1px solid var(--line)" onclick="logPhotos.splice(${i},1);renderLogPhotos()">✕</button></div>`).join('')
  +(logPhotos.length<3?`<button class="addph" onclick="$('#lgFile').click()">＋</button>`:'');
}
function addLogPhoto(input){
  const file=input.files[0]; if(!file)return;
  const img=new Image(), rd=new FileReader();
  rd.onload=()=>{img.src=rd.result};
  img.onload=()=>{
    const MAX=900, sc=Math.min(1,MAX/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    logPhotos.push(c.toDataURL('image/jpeg',.72)); renderLogPhotos();
  };
  rd.readAsDataURL(file); input.value='';
}
async function delLog(id){if(!confirm(t('confirm_del')))return; await dbDel('logs',id); vLog();}

/* ============ Settings / Backup ============ */
function openSettings(){
  modal(`<h2>${t('settings')}</h2>
  <div class="note" style="margin-bottom:14px">${t('export_note')}</div>
  <button class="btn big" onclick="exportData()">⬇ ${t('export_data')}</button>
  <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
  <button class="btn ghost big" style="margin-top:10px" onclick="$('#impFile').click()">⬆ ${t('import_data')}</button>
  <div class="note" style="margin-top:18px;text-align:center">Bakery Center v1.0 · Made with 🤎 for bakers</div>
  <button class="btn ghost big" style="margin-top:10px" onclick="closeModal()">${t('close')}</button>`);
}
async function exportData(){
  const data={app:'bakery-center',version:1,exportedAt:new Date().toISOString(),
    recipes:await dbAll('recipes'),logs:await dbAll('logs'),feedings:await dbAll('feedings')};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='bakery-center-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast(t('data_saved'));
}
async function importData(input){
  const file=input.files[0]; if(!file)return;
  if(!confirm(t('import_warn')))return void(input.value='');
  try{
    const j=JSON.parse(await file.text());
    if(j.app!=='bakery-center')throw 0;
    await dbClear('recipes'); await dbClear('logs'); await dbClear('feedings');
    for(const r of j.recipes||[])await dbPut('recipes',r);
    for(const l of j.logs||[])await dbPut('logs',l);
    for(const f of j.feedings||[])await dbPut('feedings',f);
    closeModal(); toast(t('data_saved')); render();
  }catch(e){toast(t('invalid_json'));}
  input.value='';
}

/* ============ Boot ============ */
(async function(){
  await openDB();
  const seeded=await kvGet('seeded-v1');
  if(!seeded){ for(const s of SEEDS) if(!(await dbGet('recipes',s.id))) await dbPut('recipes',s); await kvSet('seeded-v1',true); }
  LANG=(await kvGet('lang'))||'en';
  const th=(await kvGet('theme'))||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.body.dataset.theme=th;
  document.querySelector('meta[name=theme-color]').content=th==='dark'?'#191210':'#F7EFE3';
  session=await kvGet('session');
  if(session) TAB='bake';
  render();
})();
</script>
